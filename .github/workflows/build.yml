name: build

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS dependencies
        run: |
          brew update
          brew list --formula cmake >/dev/null 2>&1 || brew install cmake
          brew list --formula ninja >/dev/null 2>&1 || brew install ninja
          brew list --formula open-ocd >/dev/null 2>&1 || brew install open-ocd
          brew list --cask gcc-arm-embedded >/dev/null 2>&1 || brew install --cask gcc-arm-embedded

      - name: Verify template contract
        run: scripts/check-template.sh

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Verify template rename
        if: matrix.preset == 'Debug'
        run: |
          tmpdir="$(mktemp -d)"
          git archive --format=tar HEAD -o "$tmpdir/repo.tar"
          tar -xf "$tmpdir/repo.tar" -C "$tmpdir"
          rm "$tmpdir/repo.tar"
          cd "$tmpdir"
          scripts/rename.sh ci_demo_app
          scripts/check-template.sh
          cmake --preset Debug
          cmake --build --preset Debug
          cmake --preset Release
          cmake --build --preset Release

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.preset }}
          path: |
            build/${{ matrix.preset }}/*.elf
            build/${{ matrix.preset }}/*.hex
            build/${{ matrix.preset }}/*.bin
            build/${{ matrix.preset }}/*.map
          if-no-files-found: error
